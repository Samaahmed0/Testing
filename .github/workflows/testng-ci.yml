name: TestNG CI

# Triggers: run this pipeline on every push or pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub-hosted Linux machine

    steps:
      # Step 1: Download your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Run Maven — this executes testng.xml via Surefire plugin
      - name: Run TestNG Suite
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml

      # Step 4: Upload the HTML report so you can download it later
      - name: Upload TestNG Report
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/